<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My People</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --cream: #faf8f4;
      --warm-white: #ffffff;
      --ink: #1c1917;
      --ink-soft: #57534e;
      --ink-muted: #a8a29e;
      --border: #e7e3dc;
      --border-hover: #c9c3ba;
      --accent: #2d6a4f;
      --accent-light: #e8f5ef;
      --accent-mid: #52b788;
      --danger: #c0392b;
      --danger-light: #fdf0ee;
      --amber: #92400e;
      --amber-light: #fef3c7;
      --blue: #1e3a5f;
      --blue-light: #e8f0fb;
      --purple: #4a1d96;
      --purple-light: #f0ebff;
      --rose: #881337;
      --rose-light: #fde8ee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* Header */
    .site-header {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-title {
      font-family: 'Lora', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.3px;
    }
    .site-subtitle {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 1px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }

    /* Main content */
    .main { max-width: 680px; margin: 0 auto; padding: 1.25rem; }

    /* Search + filter */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--ink-muted); font-size: 14px; pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--warm-white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent-mid); }
    .search-input::placeholder { color: var(--ink-muted); }

    .filter-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .chip {
      font-size: 12px; font-weight: 400;
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--warm-white);
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--border-hover); }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 500;
    }

    /* Stats bar */
    .stats-bar {
      font-size: 12px; color: var(--ink-muted);
      margin-bottom: 1rem;
    }

    /* Contact cards */
    .contact-list { display: flex; flex-direction: column; gap: 8px; }

    .contact-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .contact-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .card-top { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500; flex-shrink: 0;
      font-family: 'Lora', serif;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-size: 15px; font-weight: 500;
      color: var(--ink); letter-spacing: -0.2px;
    }
    .card-family {
      font-size: 12px; color: var(--ink-muted);
      margin-top: 2px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .badge {
      font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 20px;
      flex-shrink: 0; white-space: nowrap;
    }
    .card-notes {
      font-size: 13px; color: var(--ink-soft);
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
      line-height: 1.6;
      font-family: 'Lora', serif;
      font-style: italic;
    }

    /* Empty state */
    .empty {
      text-align: center; padding: 4rem 1rem;
      color: var(--ink-muted);
    }
    .empty-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .empty-title { font-family: 'Lora', serif; font-size: 16px; color: var(--ink-soft); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    /* Modal overlay */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(28,25,23,0.5);
      z-index: 50; overflow-y: auto;
      padding: 1rem;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--warm-white);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 1.5rem;
      width: 100%; max-width: 500px;
      margin: 2rem auto;
    }
    .modal-title {
      font-family: 'Lora', serif;
      font-size: 18px; font-weight: 500;
      margin-bottom: 1.25rem; color: var(--ink);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--ink-soft); letter-spacing: 0.3px; text-transform: uppercase; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent-mid); background: white; }
    .form-group textarea { min-height: 90px; resize: vertical; line-height: 1.5; }

    .modal-actions {
      display: flex; gap: 8px;
      justify-content: flex-end; margin-top: 1.25rem;
      padding-top: 1rem; border-top: 1px solid var(--border);
    }
    .btn-ghost {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 16px;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--ink-soft); cursor: pointer;
      transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--ink); }
    .btn-danger {
      background: none; border: 1px solid #fecaca;
      border-radius: 8px; padding: 8px 16px;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--danger); cursor: pointer;
      transition: all 0.15s; margin-right: auto;
    }
    .btn-danger:hover { background: var(--danger-light); }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: white;
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; z-index: 200;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Loading */
    .loading {
      text-align: center; padding: 3rem;
      color: var(--ink-muted); font-size: 14px;
    }

    /* Config banner */
    .config-banner {
      background: #fef3c7; border: 1px solid #fbbf24;
      border-radius: 10px; padding: 1rem;
      margin-bottom: 1.25rem; font-size: 13px;
      color: var(--amber); line-height: 1.6;
    }
    .config-banner strong { font-weight: 500; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="site-title">My People</div>
      <div class="site-subtitle" id="header-count">Loading...</div>
    </div>
    <button class="btn-primary" onclick="openAdd()">+ Add person</button>
  </div>
</header>

<main class="main">
  <div id="config-warning" class="config-banner" style="display:none">
    <strong>Setup needed:</strong> Open this file in a text editor and replace <code>YOUR_SUPABASE_URL</code> and <code>YOUR_SUPABASE_ANON_KEY</code> with your credentials from Supabase → Settings → API.
  </div>

  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input class="search-input" id="search" type="text" placeholder="Search names, notes, family connections..." oninput="render()">
  </div>

  <div class="filter-row" id="filter-row"></div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="contact-list" id="contact-list"><div class="loading">Loading your people...</div></div>
</main>

<!-- Modal -->
<div class="overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add person</div>
    <div class="form-row">
      <div class="form-group"><label>First name</label><input id="f-first" type="text" placeholder="First"></div>
      <div class="form-group"><label>Last name</label><input id="f-last" type="text" placeholder="Last"></div>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="f-cat">
        <option value="">Select category...</option>
        <option>School parent</option>
        <option>Neighbor</option>
        <option>Work contact</option>
        <option>Friend</option>
        <option>Sports / activity</option>
        <option>Church / community</option>
        <option>Family</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Family connection</label>
      <input id="f-family" type="text" placeholder='e.g. "Mom of Lily, 2nd grade" or "Jake&apos;s soccer coach"'>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Anything worth remembering — how you met, topics they care about, details to recall next time..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="btn-delete" style="display:none" onclick="deleteContact()">Delete</button>
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── CONFIGURATION ───────────────────────────────────────────
  const SUPABASE_URL = 'https://hkjqbqqzteeieoyaklvk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhranFicXF6dGVlaWVveWFrbHZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTU1NzcsImV4cCI6MjA5MDczMTU3N30.7fF3T5Q_w00DnhDg1zAhA3ZJpOTdBwNxRhVqneKRSu4';
  // ─────────────────────────────────────────────────────────────

  const AVATAR_COLORS = [
    { bg: '#e8f5ef', text: '#2d6a4f' },
    { bg: '#e8f0fb', text: '#1e3a5f' },
    { bg: '#fef3c7', text: '#92400e' },
    { bg: '#f0ebff', text: '#4a1d96' },
    { bg: '#fde8ee', text: '#881337' },
    { bg: '#fde8d8', text: '#7c2d12' },
    { bg: '#e0f2fe', text: '#0c4a6e' },
    { bg: '#f0fdf4', text: '#14532d' },
  ];

  const BADGE_MAP = {
    'School parent':    { bg: '#e8f0fb', text: '#1e3a5f' },
    'Neighbor':         { bg: '#e8f5ef', text: '#2d6a4f' },
    'Work contact':     { bg: '#fef3c7', text: '#92400e' },
    'Friend':           { bg: '#f0ebff', text: '#4a1d96' },
    'Sports / activity':{ bg: '#fde8ee', text: '#881337' },
    'Church / community':{ bg: '#fde8d8', text: '#7c2d12' },
    'Family':           { bg: '#e0f2fe', text: '#0c4a6e' },
    'Other':            { bg: '#f5f5f4', text: '#57534e' },
  };

  let db = null;
  let contacts = [];
  let editingId = null;
  let activeFilter = 'All';

  function avatarColor(str) {
    let h = 0;
    for (let c of str) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }

  function initials(first, last) {
    return ((first||'')[0]||'').toUpperCase() + ((last||'')[0]||'').toUpperCase() || '?';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  async function init() {
    if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
      document.getElementById('config-warning').style.display = 'block';
      document.getElementById('contact-list').innerHTML = '';
      document.getElementById('header-count').textContent = 'Not connected';
      return;
    }
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadContacts();
  }

  async function loadContacts() {
    const { data, error } = await db.from('contacts').select('*').order('last_name').order('first_name');
    if (error) { console.error(error); showToast('Error loading contacts'); return; }
    contacts = data || [];
    render();
  }

  function getCategories() {
    return ['All', ...[...new Set(contacts.map(c => c.category).filter(Boolean))].sort()];
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const cats = getCategories();

    // Filter chips
    document.getElementById('filter-row').innerHTML = cats.map(c =>
      `<span class="chip${activeFilter === c ? ' active' : ''}" onclick="setFilter('${c}')">${c}</span>`
    ).join('');

    // Filter contacts
    let filtered = contacts.filter(c => {
      const matchCat = activeFilter === 'All' || c.category === activeFilter;
      const haystack = [c.first_name, c.last_name, c.category, c.family_connection, c.notes].join(' ').toLowerCase();
      return matchCat && (!q || haystack.includes(q));
    });

    // Sort: last name then first name
    filtered.sort((a, b) => (a.last_name||'').localeCompare(b.last_name||'') || (a.first_name||'').localeCompare(b.first_name||''));

    // Stats
    const total = contacts.length;
    document.getElementById('header-count').textContent = total === 1 ? '1 person' : `${total} people`;
    document.getElementById('stats-bar').textContent = q || activeFilter !== 'All'
      ? `Showing ${filtered.length} of ${total} people`
      : `${total} ${total === 1 ? 'person' : 'people'}`;

    const list = document.getElementById('contact-list');
    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">&#9786;</div>
          <div class="empty-title">${contacts.length ? 'No matches found' : 'No one here yet'}</div>
          <div class="empty-sub">${contacts.length ? 'Try a different search or filter' : 'Add your first person to get started'}</div>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(c => {
      const col = avatarColor((c.first_name||'') + (c.last_name||''));
      const badge = c.category ? (BADGE_MAP[c.category] || BADGE_MAP['Other']) : null;
      return `
        <div class="contact-card" onclick="openEdit('${c.id}')">
          <div class="card-top">
            <div class="avatar" style="background:${col.bg};color:${col.text}">${initials(c.first_name, c.last_name)}</div>
            <div class="card-body">
              <div class="card-name">${c.first_name||''} ${c.last_name||''}</div>
              ${c.family_connection ? `<div class="card-family">${c.family_connection}</div>` : ''}
            </div>
            ${badge ? `<span class="badge" style="background:${badge.bg};color:${badge.text}">${c.category}</span>` : ''}
          </div>
          ${c.notes ? `<div class="card-notes">${c.notes}</div>` : ''}
        </div>`;
    }).join('');
  }

  function setFilter(cat) {
    activeFilter = cat;
    render();
  }

  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add person';
    document.getElementById('f-first').value = '';
    document.getElementById('f-last').value = '';
    document.getElementById('f-cat').value = '';
    document.getElementById('f-family').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('btn-delete').style.display = 'none';
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('f-first').focus();
  }

  function openEdit(id) {
    const c = contacts.find(x => x.id === id);
    if (!c) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit person';
    document.getElementById('f-first').value = c.first_name || '';
    document.getElementById('f-last').value = c.last_name || '';
    document.getElementById('f-cat').value = c.category || '';
    document.getElementById('f-family').value = c.family_connection || '';
    document.getElementById('f-notes').value = c.notes || '';
    document.getElementById('btn-delete').style.display = 'block';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  async function saveContact() {
    const first = document.getElementById('f-first').value.trim();
    const last = document.getElementById('f-last').value.trim();
    if (!first && !last) { showToast('Please enter a name'); return; }

    const data = {
      first_name: first,
      last_name: last,
      category: document.getElementById('f-cat').value || null,
      family_connection: document.getElementById('f-family').value.trim() || null,
      notes: document.getElementById('f-notes').value.trim() || null,
    };

    let error;
    if (editingId) {
      ({ error } = await db.from('contacts').update(data).eq('id', editingId));
    } else {
      ({ error } = await db.from('contacts').insert(data));
    }

    if (error) { console.error(error); showToast('Error saving — check console'); return; }
    closeModal();
    await loadContacts();
    showToast(editingId ? 'Contact updated' : 'Person added!');
  }

  async function deleteContact() {
    if (!editingId || !confirm('Delete this person? This cannot be undone.')) return;
    const { error } = await db.from('contacts').delete().eq('id', editingId);
    if (error) { showToast('Error deleting'); return; }
    closeModal();
    await loadContacts();
    showToast('Contact deleted');
  }

  init();
</script>
</body>
</html>
